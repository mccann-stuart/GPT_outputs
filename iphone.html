<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>JSX Viewer - Mobile</title>
    <!-- Import map for React -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "recharts": "https://esm.sh/recharts?external=react,react-dom"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --viewer-bg: #f2f2f7;
            /* iOS grouped background color */
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
            --nav-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(60, 60, 67, 0.29);
            /* iOS default border color */
            --tint-color: #007aff;
            /* iOS default tint color */
        }

        html,
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--viewer-bg);
            -webkit-text-size-adjust: 100%;
            height: 100%;
            overflow: hidden;
            /* Prevent body scroll, handle scroll in root */
        }

        /* Top Navigation Bar */
        #top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding-top: var(--safe-area-top);
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--border-color);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: calc(44px + var(--safe-area-top));
            /* Standard iOS nav bar height */
        }

        .select-wrapper {
            position: relative;
            width: 80%;
            max-width: 300px;
        }

        .select-wrapper::after {
            content: '▼';
            font-size: 10px;
            color: #8e8e93;
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        #jsx-select {
            appearance: none;
            -webkit-appearance: none;
            width: 100%;
            padding: 8px 30px 8px 16px;
            font-size: 16px;
            font-weight: 600;
            background: rgba(118, 118, 128, 0.12);
            border: none;
            border-radius: 10px;
            color: #000;
            text-align: center;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        #jsx-select:focus {
            outline: none;
        }

        /* Bottom Tab Bar */
        #bottom-tab {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding-bottom: var(--safe-area-bottom);
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--border-color);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            height: calc(49px + var(--safe-area-bottom));
            /* Standard iOS tab bar height */
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--tint-color);
            font-size: 17px;
            padding: 10px 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tab-btn:active {
            opacity: 0.5;
        }

        .tab-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .tab-btn span {
            font-size: 10px;
            font-weight: 500;
        }

        #share-url {
            display: none;
        }

        /* Main Content Area */
        #scroll-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            /* Smooth scrolling on iOS */
            padding-top: calc(44px + var(--safe-area-top));
            padding-bottom: calc(49px + var(--safe-area-bottom));
        }

        #root {
            min-height: 100%;
            width: 100%;
            max-width: 100vw;
            overflow-x: hidden;
            background: var(--viewer-bg);
        }

        .error-message {
            color: #ff3b30;
            /* iOS red */
            background: #ffebee;
            padding: 16px;
            margin: 20px;
            border-radius: 12px;
            font-family: "SF Mono", Menlo, Consolas, monospace;
            white-space: pre-wrap;
            font-size: 14px;
        }

        .loading {
            padding: 40px 20px;
            color: #8e8e93;
            /* iOS gray */
            text-align: center;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <div id="top-nav">
        <div class="select-wrapper">
            <select id="jsx-select">
                <option value="truelayer-calculator-reverse-engineered.jsx">truelayer-calculator-reverse-engineered.jsx
                </option>
                <option value="gammamodel.jsx">gammamodel.jsx</option>
                <option value="claudegammamodel.jsx">claudegammamodel.jsx</option>
                <option value="nicemodel.jsx">nicemodel.jsx</option>
                <option value="nice-model.jsx">nice-model.jsx</option>
                <option value="mewmodel.jsx">mewmodel.jsx</option>
            </select>
        </div>
    </div>

    <div id="scroll-container">
        <div id="root"></div>
    </div>

    <div id="bottom-tab">
        <button id="reset-btn" class="tab-btn" type="button">
            <svg viewBox="0 0 24 24">
                <path
                    d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
            </svg>
            <span>Reset</span>
        </button>
        <button id="copy-link-btn" class="tab-btn" type="button">
            <svg viewBox="0 0 24 24">
                <path
                    d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z" />
            </svg>
            <span>Copy Link</span>
        </button>
    </div>
    <input type="text" id="share-url" readonly />

    <script type="module">
        import React from 'react';
        import { createRoot } from 'react-dom/client';

        window.React = React; // Expose React globally just in case components expect it

        window.addEventListener('error', (e) => {
            const rootEl = document.getElementById('root');
            if (rootEl) {
                rootEl.textContent = '';
                const errDiv = document.createElement('div');
                errDiv.className = 'error-message';
                errDiv.textContent = `Uncaught Error: ${e.message}\nCheck browser console for more details.`;
                rootEl.appendChild(errDiv);
            }
        });
        window.addEventListener('unhandledrejection', (e) => {
            const rootEl = document.getElementById('root');
            if (rootEl) {
                const msg = e.reason && e.reason.message ? e.reason.message : e.reason;
                rootEl.textContent = '';
                const errDiv = document.createElement('div');
                errDiv.className = 'error-message';
                errDiv.textContent = `Unhandled Promise Rejection: ${msg}\nCheck browser console for more details.`;
                rootEl.appendChild(errDiv);
            }
        });

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        const DEFAULT_PAGE_BG = '#f2f2f7';

        const ALLOWED_FILES = [
            'truelayer-calculator-reverse-engineered.jsx',
            'gammamodel.jsx',
            'claudegammamodel.jsx',
            'nicemodel.jsx',
            'nice-model.jsx',
            'mewmodel.jsx'
        ];

        const SHARE_PARAM = 'state';
        const DEFAULT_FILE = 'truelayer-calculator-reverse-engineered.jsx';

        const selectEl = document.getElementById('jsx-select');
        const resetBtn = document.getElementById('reset-btn');
        const shareUrlEl = document.getElementById('share-url');
        const copyLinkBtn = document.getElementById('copy-link-btn');

        let currentFile = null;
        let currentComponent = null;
        let currentDefaultSettings = {};
        let currentInitialSettings = {};
        let currentSettings = {};
        let currentMountKey = '';
        let renderVersion = 0;

        function isPlainObject(value) {
            return value !== null && typeof value === 'object' && !Array.isArray(value);
        }

        function deepClone(value) {
            if (Array.isArray(value)) {
                return value.map(deepClone);
            }
            if (isPlainObject(value)) {
                const copy = {};
                Object.keys(value).forEach((key) => {
                    copy[key] = deepClone(value[key]);
                });
                return copy;
            }
            return value;
        }

        function deepEqual(a, b) {
            if (Object.is(a, b)) return true;
            if (typeof a !== typeof b) return false;
            if (Array.isArray(a) && Array.isArray(b)) {
                if (a.length !== b.length) return false;
                for (let i = 0; i < a.length; i += 1) {
                    if (!deepEqual(a[i], b[i])) return false;
                }
                return true;
            }
            if (isPlainObject(a) && isPlainObject(b)) {
                const aKeys = Object.keys(a);
                const bKeys = Object.keys(b);
                if (aKeys.length !== bKeys.length) return false;
                for (const key of aKeys) {
                    if (!Object.prototype.hasOwnProperty.call(b, key)) return false;
                    if (!deepEqual(a[key], b[key])) return false;
                }
                return true;
            }
            return false;
        }

        function applyOverrides(defaultValue, overrideValue) {
            if (overrideValue === undefined) {
                return deepClone(defaultValue);
            }
            if (isPlainObject(defaultValue) && isPlainObject(overrideValue)) {
                const merged = {};
                const keys = new Set([...Object.keys(defaultValue), ...Object.keys(overrideValue)]);
                keys.forEach((key) => {
                    merged[key] = applyOverrides(defaultValue[key], overrideValue[key]);
                });
                return merged;
            }
            return deepClone(overrideValue);
        }

        function diffFromDefaults(currentValue, defaultValue) {
            if (deepEqual(currentValue, defaultValue)) return undefined;
            if (Array.isArray(currentValue) && Array.isArray(defaultValue)) {
                return deepClone(currentValue);
            }
            if (isPlainObject(currentValue) && isPlainObject(defaultValue)) {
                const delta = {};
                Object.keys(currentValue).forEach((key) => {
                    const child = diffFromDefaults(currentValue[key], defaultValue[key]);
                    if (child !== undefined) {
                        delta[key] = child;
                    }
                });
                return Object.keys(delta).length > 0 ? delta : undefined;
            }
            return deepClone(currentValue);
        }

        function encodeBase64Url(value) {
            const json = JSON.stringify(value);
            const bytes = new TextEncoder().encode(json);
            let binary = '';
            bytes.forEach((byte) => {
                binary += String.fromCharCode(byte);
            });
            return btoa(binary)
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/g, '');
        }

        function decodeBase64Url(value) {
            const normalized = value
                .replace(/-/g, '+')
                .replace(/_/g, '/');
            const padding = normalized.length % 4 === 0 ? '' : '='.repeat(4 - (normalized.length % 4));
            const binary = atob(normalized + padding);
            const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
            const json = new TextDecoder().decode(bytes);
            return JSON.parse(json);
        }

        function parseSharedState(encoded) {
            if (!encoded) return null;
            try {
                const parsed = decodeBase64Url(encoded);
                if (!isPlainObject(parsed) || typeof parsed.file !== 'string') return null;
                const overrides = isPlainObject(parsed.overrides) ? parsed.overrides : {};
                return { file: parsed.file, overrides };
            } catch (err) {
                console.warn('Invalid shared state in URL:', err);
                return null;
            }
        }

        function getStateFromUrl(urlLike) {
            const searchParams = new URL(urlLike, window.location.origin).searchParams;
            const sharedState = parseSharedState(searchParams.get(SHARE_PARAM));
            const fileParam = searchParams.get('file');
            const requestedFile = sharedState?.file || fileParam || DEFAULT_FILE;
            const initialFile = ALLOWED_FILES.includes(requestedFile) ? requestedFile : DEFAULT_FILE;
            const initialOverrides = initialFile === sharedState?.file
                ? (sharedState?.overrides || {})
                : {};
            return {
                initialFile,
                initialOverrides
            };
        }

        function updateFileInputs(filename) {
            const hasOption = Array.from(selectEl.options).some((opt) => opt.value === filename);
            if (hasOption) {
                selectEl.value = filename;
            }
        }

        function buildShareUrl() {
            const url = new URL(window.location.href);
            if (currentFile) {
                url.searchParams.set('file', currentFile);
            } else {
                url.searchParams.delete('file');
            }
            const overrides = diffFromDefaults(currentSettings, currentDefaultSettings);
            if (overrides && Object.keys(overrides).length > 0) {
                url.searchParams.set(SHARE_PARAM, encodeBase64Url({
                    file: currentFile,
                    overrides
                }));
            } else {
                url.searchParams.delete(SHARE_PARAM);
            }
            return url;
        }

        function updateShareUrl({ pushHistory = false } = {}) {
            if (!currentFile) return;
            const url = buildShareUrl();
            shareUrlEl.value = url.toString();
            if (pushHistory) {
                window.history.pushState({}, '', url);
            } else {
                window.history.replaceState({}, '', url);
            }
        }

        function handleSettingsChange(nextSettings) {
            if (!isPlainObject(nextSettings)) return;
            currentSettings = deepClone(nextSettings);
            updateShareUrl();
        }

        function syncPageBackgroundToComponent() {
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    const componentRoot = rootElement.firstElementChild;
                    if (!componentRoot) return;

                    const computedStyles = window.getComputedStyle(componentRoot);
                    const backgroundImage = computedStyles.backgroundImage;
                    const backgroundColor = computedStyles.backgroundColor;
                    const hasBackgroundImage = backgroundImage && backgroundImage !== 'none';
                    const hasBackgroundColor = backgroundColor &&
                        backgroundColor !== 'transparent' &&
                        backgroundColor !== 'rgba(0, 0, 0, 0)';

                    const nextBackground = hasBackgroundImage
                        ? backgroundImage
                        : hasBackgroundColor
                            ? backgroundColor
                            : DEFAULT_PAGE_BG;

                    document.documentElement.style.setProperty('--viewer-bg', nextBackground);
                });
            });
        }

        function renderCurrentComponent() {
            if (!currentComponent) return;
            root.render(React.createElement(currentComponent, {
                key: currentMountKey,
                initialSettings: currentInitialSettings,
                onSettingsChange: handleSettingsChange
            }));
            syncPageBackgroundToComponent();
        }

        async function loadJSX(filename, { initialSettingsOverrides = {}, pushHistory = true } = {}) {
            try {
                if (!ALLOWED_FILES.includes(filename)) {
                    throw new Error(`Unauthorized file: ${filename}`);
                }

                root.render(React.createElement('div', { className: 'loading' }, `Loading ${filename}...`));

                // Fetch the JSX file
                const response = await fetch(filename);
                if (!response.ok) {
                    throw new Error(`Failed to fetch ${filename}: ${response.status} ${response.statusText}`);
                }
                const jsxCode = await response.text();

                // Transpile using Babel
                let transpiled = Babel.transform(jsxCode, {
                    presets: [
                        ['react', { runtime: 'automatic' }] // Use new JSX transform
                    ],
                    filename: filename
                }).code;

                // Fix relative imports for blob URL
                const fileUrl = new URL(filename, window.location.href).href;
                transpiled = transpiled.replace(/(import|export|from)\s+['"](\.[^'"]+)['"]/g, (match, p1, p2) => {
                    const absUrl = new URL(p2, fileUrl).href;
                    return `${p1} '${absUrl}'`;
                });
                transpiled = transpiled.replace(/import\s*\(\s*['"](\.[^'"]+)['"]\s*\)/g, (match, p1) => {
                    const absUrl = new URL(p1, fileUrl).href;
                    return `import('${absUrl}')`;
                });

                // Create a module blob
                const blob = new Blob([transpiled], { type: 'application/javascript' });
                const blobUrl = URL.createObjectURL(blob);

                // Dynamically import the transpiled module
                const module = await import(blobUrl);

                // Cleanup blob URL
                URL.revokeObjectURL(blobUrl);

                // Render the default export
                const Component = module.default;
                if (!Component) {
                    throw new Error(`No default export found in ${filename}`);
                }

                currentFile = filename;
                currentComponent = Component;
                updateFileInputs(filename);

                const defaults = isPlainObject(module.DEFAULT_SETTINGS) ? module.DEFAULT_SETTINGS : {};
                currentDefaultSettings = deepClone(defaults);
                currentInitialSettings = applyOverrides(currentDefaultSettings, initialSettingsOverrides);
                currentSettings = deepClone(currentInitialSettings);

                currentMountKey = `${filename}:${++renderVersion}`;
                renderCurrentComponent();
                updateShareUrl({ pushHistory });

            } catch (err) {
                console.error(err);
                root.render(
                    React.createElement('div', { className: 'error-message' },
                        `Error loading ${filename}:\n\n${err.message}\n\nCheck the browser console for more details.`
                    )
                );
                syncPageBackgroundToComponent();
            }
        }

        selectEl.addEventListener('change', (e) => {
            if (e.target.value) {
                loadJSX(e.target.value, { pushHistory: true });
            }
        });

        resetBtn.addEventListener('click', () => {
            if (!currentComponent || !currentFile) return;
            currentInitialSettings = deepClone(currentDefaultSettings);
            currentSettings = deepClone(currentDefaultSettings);
            currentMountKey = `${currentFile}:${++renderVersion}`;
            renderCurrentComponent();
            updateShareUrl();
        });

        copyLinkBtn.addEventListener('click', async () => {
            const link = shareUrlEl.value;
            if (!link) return;
            try {
                await navigator.clipboard.writeText(link);
                // Optional: show a quick toast or change button state briefly
                const originalText = copyLinkBtn.querySelector('span').textContent;
                copyLinkBtn.querySelector('span').textContent = 'Copied!';
                setTimeout(() => {
                    copyLinkBtn.querySelector('span').textContent = originalText;
                }, 2000);
            } catch (err) {
                console.warn('Clipboard API unavailable, falling back to text selection.', err);
                shareUrlEl.style.display = 'block'; // temporarily show to select
                shareUrlEl.focus();
                shareUrlEl.select();
                document.execCommand('copy');
                shareUrlEl.style.display = 'none'; // hide again

                const originalText = copyLinkBtn.querySelector('span').textContent;
                copyLinkBtn.querySelector('span').textContent = 'Copied!';
                setTimeout(() => {
                    copyLinkBtn.querySelector('span').textContent = originalText;
                }, 2000);
            }
        });

        window.addEventListener('popstate', () => {
            const { initialFile, initialOverrides } = getStateFromUrl(window.location.href);
            loadJSX(initialFile, {
                initialSettingsOverrides: initialOverrides,
                pushHistory: false
            });
        });

        // Initialize from URL param or default
        const { initialFile, initialOverrides } = getStateFromUrl(window.location.href);

        updateFileInputs(initialFile);
        loadJSX(initialFile, {
            initialSettingsOverrides: initialOverrides,
            pushHistory: false
        });
    </script>
</body>

</html>
